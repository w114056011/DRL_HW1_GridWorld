<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Grid - Value Iteration</title>
    <!-- Pixel Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'DotGothic16', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 50px;
            background-color: #2c2c2c;
            color: #eeeeee;
        }

        h1,
        h2,
        h3 {
            text-shadow: 2px 2px #000;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            background: #3c3c3c;
            padding: 15px;
            border: 4px solid #000;
            box-shadow: inset -2px -2px 0px #222, inset 2px 2px 0px #555;
        }

        .action-bars {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input[type="number"] {
            width: 60px;
            padding: 5px;
            font-family: 'DotGothic16', sans-serif;
            font-size: 16px;
            background: #111;
            color: #fff;
            border: 2px solid #000;
            box-shadow: inset 2px 2px 0px #000;
            text-align: center;
        }

        button {
            padding: 10px 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: 4px solid #000;
            box-shadow: 4px 4px 0px 0px #111;
            border-radius: 0;
            font-family: 'DotGothic16', sans-serif;
            font-size: 16px;
            text-shadow: 1px 1px #000;
            transition: all 0.1s;
        }

        button:hover:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px #111;
            filter: brightness(1.2);
        }

        button:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px #111;
        }

        button:disabled {
            background-color: #555 !important;
            color: #888;
            cursor: not-allowed;
            border-color: #333;
            box-shadow: 4px 4px 0px 0px #111;
            text-shadow: none;
        }

        #btn-step1 {
            background-color: #d35400;
        }

        #btn-step2 {
            background-color: #27ae60;
        }

        #btn-step3 {
            background-color: #8e44ad;
        }

        .boards-container {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Pixel Grid styling */
        .grid-board {
            display: grid;
            gap: 2px;
            background-color: #000;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px 0px #111;
        }

        .cell {
            width: 50px;
            height: 50px;
            background-color: #e0e0e0;
            cursor: pointer;
            box-sizing: border-box;
            box-shadow: inset -2px -2px 0px #aaa, inset 2px 2px 0px #fff;
        }

        .cell:hover {
            filter: brightness(1.2);
        }

        .matrix-cell {
            width: 60px;
            height: 60px;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            box-shadow: inset -2px -2px 0px #aaa, inset 2px 2px 0px #fff;
        }

        /* Cell Types */
        .start {
            background-color: #2ecc71 !important;
            box-shadow: inset -2px -2px 0px #27ae60, inset 2px 2px 0px #58d68d !important;
        }

        .end {
            background-color: #e74c3c !important;
            box-shadow: inset -2px -2px 0px #c0392b, inset 2px 2px 0px #ed7669 !important;
        }

        .obstacle {
            background-color: #7f8c8d !important;
            color: transparent;
            box-shadow: inset -4px -4px 0px #555, inset 4px 4px 0px #999 !important;
        }

        .status-panel {
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            padding: 10px 20px;
            border: 4px solid #000;
            background: #222;
            box-shadow: inset -2px -2px 0px #111, inset 2px 2px 0px #444;
        }
    </style>
</head>

<body>
    <h1>網格地圖與價值迭代 (Value Iteration)</h1>
    <div class="controls">
        <label for="grid-size">維度 (n x n) [5-9]:</label>
        <input type="number" id="grid-size" min="5" max="9" value="7">
        <button onclick="generateGrid()">重置 / 生成網格</button>
    </div>

    <div class="status-panel" id="status-message">
        請點擊選擇: 起始單元格 (綠色)
    </div>

    <div class="action-bars">
        <button id="btn-step1" onclick="step1RandomPolicy()" disabled>[1. 產生隨機策略]</button>
        <button id="btn-step2" onclick="step2EvalRandom()" disabled>[2. 評估隨機策略]</button>
        <button id="btn-step3" onclick="step3ValueIteration()" disabled>[3. 執行價值迭代]</button>
    </div>

    <!-- Setup View -->
    <div id="setup-view">
        <div id="grid-container" class="grid-board"></div>
    </div>

    <!-- Evaluation View (Split into two sets) -->
    <div id="evaluation-view" style="display: none; width: 100%; flex-direction: column; align-items: center;">

        <div id="section-hw1-2" style="display: none; width: 100%;">
            <h2 style="text-align: center; margin-top: 30px; margin-bottom: 5px; color:#f39c12">隨機策略評估</h2>
            <div class="boards-container">
                <div class="board-wrapper">
                    <h3>Value V(s)</h3>
                    <div id="value-grid-rand" class="grid-board"></div>
                </div>
                <div class="board-wrapper">
                    <h3>Policy Matrix</h3>
                    <div id="policy-grid-rand" class="grid-board"></div>
                </div>
            </div>
            <hr style="margin: 30px auto; width: 80%; border: 2px solid #555;">
        </div>

        <div id="section-hw1-3" style="display: none; width: 100%;">
            <h2 style="text-align: center; margin-bottom: 5px; color:#9b59b6">價值迭代算法</h2>
            <div class="boards-container">
                <div class="board-wrapper">
                    <h3>Value V*(s)</h3>
                    <div id="value-grid-opt" class="grid-board"></div>
                </div>
                <div class="board-wrapper">
                    <h3>Optimal Policy</h3>
                    <div id="policy-grid-opt" class="grid-board"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let currentState = 'START';
        let n = 7;
        let obstaclesCount = 0;
        let maxObstacles = n - 2;
        let cellsData = [];
        let startIndex = -1;
        let endIndex = -1;

        // Models
        let randomPolicyData = [];

        const arrows = { 'U': '↑', 'D': '↓', 'L': '←', 'R': '→' };

        function updateStatus() {
            const statusEl = document.getElementById('status-message');
            const btn1 = document.getElementById('btn-step1');
            const btn2 = document.getElementById('btn-step2');
            const btn3 = document.getElementById('btn-step3');

            if (currentState === 'START') {
                statusEl.textContent = '請點擊選擇: 起始單元格 (綠色)';
                statusEl.style.color = '#2ecc71';
                btn1.disabled = true; btn2.disabled = true; btn3.disabled = true;
            } else if (currentState === 'END') {
                statusEl.textContent = '請點擊選擇: 結束單元格 (紅色)';
                statusEl.style.color = '#e74c3c';
            } else if (currentState === 'OBSTACLE') {
                statusEl.textContent = `請點擊選擇: 障礙物 (灰色) [已放置: ${obstaclesCount} / ${maxObstacles}]`;
                statusEl.style.color = '#bdc3c7';
            } else if (currentState === 'DONE') {
                statusEl.textContent = '地圖設定完成！請點擊 [1. 產生隨機策略]';
                statusEl.style.color = '#fff';
                btn1.disabled = false; btn2.disabled = true; btn3.disabled = true;
            } else if (currentState === 'STEP1') {
                statusEl.textContent = '隨機策略已產生！請點擊 [2. 評估隨機策略]';
                btn1.disabled = true; btn2.disabled = false; btn3.disabled = true;
            } else if (currentState === 'STEP2') {
                statusEl.textContent = '隨機策略評估完成！請點擊 [3. 執行價值迭代] 找出最佳解';
                btn1.disabled = true; btn2.disabled = true; btn3.disabled = false;
            } else if (currentState === 'STEP3') {
                statusEl.textContent = '價值迭代計算完成！已顯示最佳策略軌跡。';
                statusEl.style.color = '#f1c40f';
                btn1.disabled = true; btn2.disabled = true; btn3.disabled = true;
            }
        }

        function handleCellClick(e) {
            if (currentState === 'DONE' || currentState === 'STEP1' || currentState === 'STEP2' || currentState === 'STEP3') return;

            const cell = e.target;
            const idx = parseInt(cell.dataset.index);

            if (cellsData[idx] !== 'normal') return;

            if (currentState === 'START') {
                cell.classList.add('start');
                cellsData[idx] = 'start';
                startIndex = idx;
                currentState = 'END';
                updateStatus();
            } else if (currentState === 'END') {
                cell.classList.add('end');
                cellsData[idx] = 'end';
                endIndex = idx;
                currentState = 'OBSTACLE';
                updateStatus();
            } else if (currentState === 'OBSTACLE') {
                cell.classList.add('obstacle');
                cellsData[idx] = 'obstacle';
                obstaclesCount++;
                if (obstaclesCount >= maxObstacles) {
                    currentState = 'DONE';
                }
                updateStatus();
            }
        }

        function buildGridDOM(containerId, isSetup) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${n}, ${isSetup ? '50px' : '65px'})`;
            container.style.gridTemplateRows = `repeat(${n}, ${isSetup ? '50px' : '65px'})`;

            const elements = [];
            for (let i = 0; i < n * n; i++) {
                const cell = document.createElement('div');
                cell.className = isSetup ? 'cell' : 'matrix-cell';
                if (isSetup) cell.dataset.index = i;

                if (cellsData[i] === 'start') cell.classList.add('start');
                if (cellsData[i] === 'end') cell.classList.add('end');
                if (cellsData[i] === 'obstacle') cell.classList.add('obstacle');

                if (isSetup) cell.addEventListener('click', handleCellClick);
                container.appendChild(cell);
                elements.push(cell);
            }
            return elements;
        }

        function generateGrid() {
            const sizeInput = document.getElementById('grid-size');
            n = parseInt(sizeInput.value);
            if (n < 5) n = 5;
            if (n > 9) n = 9;
            sizeInput.value = n;

            maxObstacles = n - 2;
            cellsData = new Array(n * n).fill('normal');
            startIndex = -1;
            endIndex = -1;
            randomPolicyData = [];

            document.getElementById('setup-view').style.display = 'block';
            document.getElementById('evaluation-view').style.display = 'none';
            document.getElementById('section-hw1-2').style.display = 'none';
            document.getElementById('section-hw1-3').style.display = 'none';

            currentState = 'START';
            obstaclesCount = 0;
            updateStatus();
            buildGridDOM('grid-container', true);
        }

        // --- Core Logics ---

        function getCoord(idx) { return { r: Math.floor(idx / n), c: idx % n }; }
        function getIdx(r, c) { return r * n + c; }
        function getNextState(idx, action) {
            let { r, c } = getCoord(idx);
            if (action === 'U') r--;
            else if (action === 'D') r++;
            else if (action === 'L') c--;
            else if (action === 'R') c++;

            if (r < 0 || r >= n || c < 0 || c >= n) return idx;
            let nextIdx = getIdx(r, c);
            if (cellsData[nextIdx] === 'obstacle') return idx;
            return nextIdx;
        }

        async function step1RandomPolicy() {
            try {
                const response = await fetch('/generate_random_policy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ n: n, cellsData: cellsData, endIndex: endIndex })
                });
                const result = await response.json();
                randomPolicyData = result.pi;

                document.getElementById('setup-view').style.display = 'none';
                document.getElementById('evaluation-view').style.display = 'flex';
                document.getElementById('section-hw1-2').style.display = 'block';

                const valElementsRand = buildGridDOM('value-grid-rand', false);
                const polElementsRand = buildGridDOM('policy-grid-rand', false);

                for (let i = 0; i < n * n; i++) {
                    if (cellsData[i] === 'obstacle') continue;
                    if (i === endIndex) {
                        valElementsRand[i].textContent = '0.00';
                        polElementsRand[i].style.fontSize = '14px';
                        polElementsRand[i].textContent = 'END';
                    } else {
                        valElementsRand[i].textContent = '?'; // Not evaluated yet
                        polElementsRand[i].innerHTML = `<span>${arrows[randomPolicyData[i]]}</span>`;
                    }
                }

                currentState = 'STEP1';
                updateStatus();
            } catch (error) {
                console.error("Step 1 failed:", error);
                alert("產生隨機策略失敗，請檢查後端！");
            }
        }

        async function step2EvalRandom() {
            try {
                const response = await fetch('/evaluate_policy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ n: n, cellsData: cellsData, endIndex: endIndex, pi: randomPolicyData })
                });
                const result = await response.json();
                const V_rand = result.V;

                // Re-fetch elements just to be safe
                const valElementsRand = document.getElementById('value-grid-rand').children;

                for (let i = 0; i < n * n; i++) {
                    if (cellsData[i] === 'obstacle') continue;
                    if (i === endIndex) {
                        valElementsRand[i].textContent = '0.00';
                    } else {
                        valElementsRand[i].textContent = V_rand[i].toFixed(2);
                    }
                }

                currentState = 'STEP2';
                updateStatus();
            } catch (error) {
                console.error("Step 2 failed:", error);
                alert("評估運算失敗，請檢查後端！");
            }
        }

        async function step3ValueIteration() {
            try {
                const response = await fetch('/value_iteration', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ n: n, cellsData: cellsData, endIndex: endIndex })
                });
                const result = await response.json();
                const opt_V = result.V;
                const opt_pi = result.pi;

                document.getElementById('section-hw1-3').style.display = 'block';

                const valElementsOpt = buildGridDOM('value-grid-opt', false);
                const polElementsOpt = buildGridDOM('policy-grid-opt', false);

                // Trace Optimal Path
                let currentIdx = startIndex;
                let pathIndices = new Set();
                let safetyCounter = 0;

                while (currentIdx !== endIndex && currentIdx !== -1 && safetyCounter < n * n) {
                    pathIndices.add(currentIdx);
                    let a = opt_pi[currentIdx];
                    if (!a) break;
                    let nextIdx = getNextState(currentIdx, a);
                    if (nextIdx === currentIdx) { break; }
                    currentIdx = nextIdx;
                    safetyCounter++;
                }
                if (currentIdx === endIndex) {
                    pathIndices.add(endIndex);
                }

                for (let i = 0; i < n * n; i++) {
                    if (cellsData[i] === 'obstacle') continue;

                    if (pathIndices.has(i)) {
                        polElementsOpt[i].style.backgroundColor = '#f1c40f'; // Pixel Gold
                    }

                    if (i === endIndex) {
                        valElementsOpt[i].textContent = '0.00';
                        polElementsOpt[i].style.fontSize = '14px';
                        polElementsOpt[i].style.fontWeight = 'bold';
                        polElementsOpt[i].textContent = 'END';
                    } else {
                        valElementsOpt[i].textContent = opt_V[i].toFixed(2);
                        polElementsOpt[i].innerHTML = `<span>${arrows[opt_pi[i]]}</span>`;
                    }
                }

                currentState = 'STEP3';
                updateStatus();
            } catch (error) {
                console.error("Step 3 failed:", error);
                alert("價值迭代運算失敗，請檢查後端！");
            }
        }

        // Init blank
        generateGrid();
    </script>
</body>

</html>
